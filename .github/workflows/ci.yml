name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Run JavaScript-based actions (checkout, setup-node) on Node.js 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Matches apps/api and apps/worker integration tests (see test/helpers.ts).
  DATABASE_URL: postgres://route_helper:route_helper_ci@localhost:5432/route_helper
  JWT_SECRET: ci-jwt-secret

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: route_helper
          POSTGRES_PASSWORD: route_helper_ci
          POSTGRES_DB: route_helper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U route_helper -d route_helper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Bun 1.1.x treats `bun test ./test` as a module path; 1.2+ discovers tests in the folder.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
